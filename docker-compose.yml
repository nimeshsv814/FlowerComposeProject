version: '3.8'

services:
  flower-app-web:
    image: nimeshsv814/flower-app:v1.1.0
    container_name: flower-app
    ports:
      - "3016:3015"
    environment:
      MONGO_URI: mongodb://mongodb-cont:27017/AFF-Docker
    depends_on:
      - flower-mongodb
    networks:
      - flower-network

  flower-mongodb:
    image: mongo
    container_name: mongodb-cont
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - flower-network
  
  retail-frontend:
    image: nimeshsv814/retail-app:v1.1.0
    container_name: retail-front-cont
    ports:
      - "82:3000"
    networks:
      - flower-network
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=retail_user
      - DB_PASSWORD=retail_pass
      - DB_NAME=retail
    depends_on:
      - retail-backend
  
  retail-backend:
    image: mysql
    container_name: retail-back-cont
    ports:
      - "3306:3306"
    volumes:
      - sql_data:/var/lib/mysql
    networks:
      - flower-network
    environment:
      - MYSQL_DATABASE=retail
      - MYSQL_USER=retail_user
      - MYSQL_PASSWORD=retail_pass
      - MYSQL_ROOT_PASSWORD=root_pass

volumes:
  mongo_data:
  sql_data:

networks:
  flower-network: